<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonitorSDK - 前端监控SDK</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
      }
      h1 {
        color: #333;
        margin-bottom: 10px;
      }
      .subtitle {
        color: #666;
        margin-bottom: 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 20px;
      }
      .section {
        background: white;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h2 {
        color: #666;
        margin-bottom: 15px;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      h2 .icon {
        font-size: 20px;
      }
      .status-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        margin-left: auto;
      }
      .status-badge.active {
        background: #d4edda;
        color: #155724;
      }
      .status-badge.inactive {
        background: #f8d7da;
        color: #721c24;
      }
      .btn {
        padding: 8px 16px;
        margin: 4px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
      }
      .btn-primary {
        background: #1890ff;
        color: white;
      }
      .btn-primary:hover {
        background: #40a9ff;
      }
      .btn-success {
        background: #52c41a;
        color: white;
      }
      .btn-success:hover {
        background: #73d13d;
      }
      .btn-danger {
        background: #ff4d4f;
        color: white;
      }
      .btn-danger:hover {
        background: #ff7875;
      }
      .btn-warning {
        background: #faad14;
        color: white;
      }
      .btn-warning:hover {
        background: #ffc53d;
      }
      .event-log {
        max-height: 200px;
        overflow-y: auto;
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 10px;
        border-radius: 6px;
        font-family: "Monaco", "Menlo", monospace;
        font-size: 11px;
        line-height: 1.5;
      }
      .event-item {
        margin-bottom: 6px;
        padding: 6px;
        background: #2d2d2d;
        border-radius: 3px;
      }
      .event-type {
        font-weight: bold;
      }
      .event-type.track {
        color: #4ec9b0;
      }
      .event-type.performance {
        color: #ce9178;
      }
      .event-type.error {
        color: #ff4d4f;
      }
      .event-type.blankScreen {
        color: #dcdcaa;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 15px;
      }
      .stat-card {
        background: #f0f2f5;
        padding: 12px;
        border-radius: 6px;
        text-align: center;
      }
      .stat-value {
        font-size: 24px;
        font-weight: bold;
        color: #1890ff;
      }
      .stat-label {
        font-size: 11px;
        color: #666;
        margin-top: 4px;
      }
      .config-info {
        background: #e6f7ff;
        padding: 10px 15px;
        border-radius: 6px;
        border: 1px solid #91d5ff;
        margin-bottom: 15px;
        font-size: 13px;
      }
      .config-info code {
        background: #d6e4ff;
        padding: 2px 6px;
        border-radius: 3px;
      }
      .test-area {
        margin-top: 10px;
      }
      .test-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .hint {
        color: #999;
        font-size: 12px;
        margin-top: 10px;
      }
      .empty-log {
        color: #6a9955;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎯 MonitorSDK - 前端监控SDK</h1>
      <p class="subtitle">一站式前端监控解决方案：埋点 + 性能监控 + 错误监控 + 白屏检测</p>

      <div class="config-info">
        <strong>SDK状态：</strong>
        <span id="sdkStatus" class="status-badge inactive">未初始化</span>
        &nbsp;|&nbsp;
        <strong>站点ID：</strong><code id="sid">-</code>
        &nbsp;|&nbsp;
        <strong>页面ID：</strong><code id="pid">-</code>
        &nbsp;|&nbsp;
        <strong>上报URL：</strong><code id="reportUrl">-</code>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalEvents">0</div>
          <div class="stat-label">总事件数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="trackEvents">0</div>
          <div class="stat-label">埋点事件</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="perfEvents">0</div>
          <div class="stat-label">性能事件</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="errorEvents">0</div>
          <div class="stat-label">错误事件</div>
        </div>
      </div>

      <div class="grid">
        <!-- 埋点模块 -->
        <div class="section">
          <h2>
            <span class="icon">📊</span> 埋点监控 <span id="trackerStatus" class="status-badge inactive">未启用</span>
          </h2>
          <div class="test-area">
            <div class="test-buttons">
              <button class="btn btn-success" data-cls="btn-test-1" data-cls-ext='{"action":"test"}'>
                测试点击埋点
              </button>
              <button class="btn btn-primary" onclick="sdk.track('custom', 'custom-event', { source: 'manual' })">
                手动埋点
              </button>
            </div>
          </div>
          <div class="hint">点击按钮触发埋点事件，或使用 data-cls 属性自动追踪</div>
        </div>

        <!-- 性能模块 -->
        <div class="section">
          <h2>
            <span class="icon">⚡</span> 性能监控 <span id="perfStatus" class="status-badge inactive">未启用</span>
          </h2>
          <div class="event-log" id="perfLog">
            <div class="empty-log">// 等待性能数据...</div>
          </div>
        </div>

        <!-- 错误模块 -->
        <div class="section">
          <h2>
            <span class="icon">🐛</span> 错误监控 <span id="errorStatus" class="status-badge inactive">未启用</span>
          </h2>
          <div class="test-area">
            <div class="test-buttons">
              <button class="btn btn-danger" onclick="testJSError()">触发JS错误</button>
              <button class="btn btn-danger" onclick="testPromiseError()">触发Promise错误</button>
              <button class="btn btn-warning" onclick="sdk.captureError('手动错误', { source: 'test' })">
                手动上报
              </button>
            </div>
          </div>
          <div class="event-log" id="errorLog">
            <div class="empty-log">// 等待错误事件...</div>
          </div>
        </div>

        <!-- 白屏模块 -->
        <div class="section">
          <h2>
            <span class="icon">🖥️</span> 白屏检测 <span id="blankStatus" class="status-badge inactive">未启用</span>
          </h2>
          <div class="test-area">
            <div class="test-buttons">
              <button class="btn btn-primary" onclick="detectBlankScreen()">检测白屏</button>
            </div>
          </div>
          <div
            id="blankScreenResult"
            style="margin-top: 10px; padding: 10px; background: #f0f2f5; border-radius: 6px; display: none"
          >
            <strong>检测结果：</strong><span id="blankResult"></span>
          </div>
        </div>
      </div>

      <!-- 全局事件日志 -->
      <div class="section" style="margin-top: 20px">
        <h2><span class="icon">📋</span> 全局事件日志</h2>
        <div class="event-log" id="globalLog" style="max-height: 300px">
          <div class="empty-log">// 等待事件...</div>
        </div>
      </div>

      <!-- 控制面板 -->
      <div class="section" style="margin-top: 20px">
        <h2><span class="icon">🎮</span> 控制面板</h2>
        <div class="test-buttons">
          <button class="btn btn-primary" onclick="initSDK()">初始化SDK</button>
          <button class="btn btn-danger" onclick="destroySDK()">销毁SDK</button>
          <button class="btn btn-warning" onclick="clearLogs()">清空日志</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { MonitorSDK } from "./src/index.ts";

      // 事件计数
      let totalEvents = 0;
      let trackEvents = 0;
      let perfEvents = 0;
      let errorEvents = 0;

      // SDK实例
      window.sdk = null;

      // 初始化SDK
      window.initSDK = function () {
        if (sdk) {
          alert("SDK已初始化");
          return;
        }

        sdk = new MonitorSDK({
          sid: "test-site-001",
          pid: "test-page-001",
          reportUrl: "https://httpbin.org/post",
          enableTracker: true,
          enablePerformance: true,
          enableError: true,
          enableBlankScreen: true,
        });

        sdk.init();

        // 更新状态
        document.getElementById("sdkStatus").textContent = "已初始化";
        document.getElementById("sdkStatus").className = "status-badge active";
        document.getElementById("sid").textContent = "test-site-001";
        document.getElementById("pid").textContent = "test-page-001";
        document.getElementById("reportUrl").textContent = "https://httpbin.org/post";

        const status = sdk.getStatus();
        updateStatusBadge("trackerStatus", status.trackerEnabled);
        updateStatusBadge("perfStatus", status.performanceEnabled);
        updateStatusBadge("errorStatus", status.errorEnabled);
        updateStatusBadge("blankStatus", status.blankScreenEnabled);

        addGlobalLog("system", "SDK初始化成功");
      };

      // 销毁SDK
      window.destroySDK = function () {
        if (!sdk) {
          alert("SDK未初始化");
          return;
        }

        sdk.destroy();
        sdk = null;

        document.getElementById("sdkStatus").textContent = "未初始化";
        document.getElementById("sdkStatus").className = "status-badge inactive";

        updateStatusBadge("trackerStatus", false);
        updateStatusBadge("perfStatus", false);
        updateStatusBadge("errorStatus", false);
        updateStatusBadge("blankStatus", false);

        addGlobalLog("system", "SDK已销毁");
      };

      // 测试JS错误
      window.testJSError = function () {
        throw new Error("这是一个测试JS错误");
      };

      // 测试Promise错误
      window.testPromiseError = function () {
        Promise.reject("这是一个测试Promise错误");
      };

      // 检测白屏
      window.detectBlankScreen = function () {
        if (!sdk) {
          alert("请先初始化SDK");
          return;
        }

        const result = sdk.detectBlankScreen();
        if (result) {
          document.getElementById("blankScreenResult").style.display = "block";
          document.getElementById("blankResult").innerHTML =
            `白屏: ${result.isBlank ? "是" : "否"}, 空白比例: ${(result.blankRatio * 100).toFixed(1)}%`;
        }
      };

      // 清空日志
      window.clearLogs = function () {
        document.getElementById("perfLog").innerHTML = '<div class="empty-log">// 等待性能数据...</div>';
        document.getElementById("errorLog").innerHTML = '<div class="empty-log">// 等待错误事件...</div>';
        document.getElementById("globalLog").innerHTML = '<div class="empty-log">// 等待事件...</div>';
      };

      // 更新状态徽章
      function updateStatusBadge(id, active) {
        const el = document.getElementById(id);
        el.textContent = active ? "已启用" : "未启用";
        el.className = "status-badge " + (active ? "active" : "inactive");
      }

      // 更新统计
      function updateStats() {
        document.getElementById("totalEvents").textContent = totalEvents;
        document.getElementById("trackEvents").textContent = trackEvents;
        document.getElementById("perfEvents").textContent = perfEvents;
        document.getElementById("errorEvents").textContent = errorEvents;
      }

      // 添加全局日志
      function addGlobalLog(type, message) {
        const log = document.getElementById("globalLog");
        const item = document.createElement("div");
        item.className = "event-item";
        item.innerHTML = `
        <span class="event-type ${type}">[${type.toUpperCase()}]</span>
        <span>${message}</span>
        <span style="color: #6a9955; font-size: 10px; margin-left: 10px;">${new Date().toLocaleTimeString()}</span>
      `;
        log.insertBefore(item, log.firstChild);
      }

      // 初始化SDK
      initSDK();
    </script>
  </body>
</html>
