<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>埋点模块测试</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        color: #333;
        margin-bottom: 20px;
      }
      .section {
        background: white;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h2 {
        color: #666;
        margin-bottom: 15px;
        font-size: 18px;
      }
      .btn {
        padding: 12px 24px;
        margin: 5px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }
      .btn-primary {
        background: #1890ff;
        color: white;
      }
      .btn-primary:hover {
        background: #40a9ff;
      }
      .btn-success {
        background: #52c41a;
        color: white;
      }
      .btn-success:hover {
        background: #73d13d;
      }
      .exposure-box {
        height: 300px;
        overflow-y: auto;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 10px;
        margin-bottom: 20px;
      }
      .exposure-item {
        height: 200px;
        margin-bottom: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 20px;
        font-weight: bold;
      }
      .event-log {
        max-height: 300px;
        overflow-y: auto;
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 15px;
        border-radius: 6px;
        font-family: "Monaco", "Menlo", monospace;
        font-size: 12px;
        line-height: 1.6;
      }
      .event-item {
        margin-bottom: 8px;
        padding: 8px;
        background: #2d2d2d;
        border-radius: 4px;
      }
      .event-type {
        color: #4ec9b0;
        font-weight: bold;
      }
      .event-cls {
        color: #ce9178;
      }
      .event-time {
        color: #6a9955;
        font-size: 11px;
      }
      .stats {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
      }
      .stat-item {
        background: #f0f2f5;
        padding: 15px 25px;
        border-radius: 6px;
        text-align: center;
      }
      .stat-value {
        font-size: 28px;
        font-weight: bold;
        color: #1890ff;
      }
      .stat-label {
        font-size: 12px;
        color: #666;
        margin-top: 5px;
      }
      .hint {
        color: #999;
        font-size: 12px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📊 埋点模块测试</h1>

      <div class="section">
        <h2>点击事件测试</h2>
        <p class="hint">点击下方按钮，事件将被记录并显示在事件日志中</p>
        <div>
          <button class="btn btn-primary" data-cls="btn-click-1" data-cls-ext='{"position":"top","color":"blue"}'>
            按钮 1
          </button>
          <button class="btn btn-primary" data-cls="btn-click-2" data-cls-ext='{"position":"top","color":"blue"}'>
            按钮 2
          </button>
          <button class="btn btn-success" data-cls="btn-click-3" data-cls-ext='{"position":"top","color":"green"}'>
            按钮 3
          </button>
        </div>
      </div>

      <div class="section">
        <h2>曝光事件测试</h2>
        <p class="hint">滚动下方区域，当元素进入视口并停留 500ms 后触发曝光事件</p>
        <div class="exposure-box">
          <div class="exposure-item" data-cls="exp-1" data-cls-ext='{"section":"scroll","index":1}'>曝光元素 1</div>
          <div class="exposure-item" data-cls="exp-2" data-cls-ext='{"section":"scroll","index":2}'>曝光元素 2</div>
          <div class="exposure-item" data-cls="exp-3" data-cls-ext='{"section":"scroll","index":3}'>曝光元素 3</div>
          <div class="exposure-item" data-cls="exp-4" data-cls-ext='{"section":"scroll","index":4}'>曝光元素 4</div>
          <div class="exposure-item" data-cls="exp-5" data-cls-ext='{"section":"scroll","index":5}'>曝光元素 5</div>
        </div>
      </div>

      <div class="section">
        <h2>事件统计</h2>
        <div class="stats">
          <div class="stat-item">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">总事件数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="clickCount">0</div>
            <div class="stat-label">点击事件</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="exposureCount">0</div>
            <div class="stat-label">曝光事件</div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>事件日志</h2>
        <div class="event-log" id="eventLog">
          <div style="color: #6a9955">// 等待事件...</div>
        </div>
      </div>

      <div class="section">
        <h2>操作</h2>
        <button class="btn btn-primary" onclick="clearEvents()">清空事件</button>
        <button class="btn btn-success" onclick="getEvents()">获取所有事件</button>
      </div>
    </div>

    <script type="module">
      import { Tracker } from "./src/index.ts";

      // 创建tracker实例
      window.tracker = new Tracker({
        sid: "test-site-001",
        pid: "test-page-001",
        click: true,
        exposure: true,
        exposureThreshold: 0.5,
        exposureDuration: 500,
      });

      // 事件计数
      let clickCount = 0;
      let exposureCount = 0;

      // 监听事件
      tracker.onEvent = function (event) {
        console.log("埋点事件:", event);

        // 更新计数
        if (event.eventType === "click") {
          clickCount++;
          document.getElementById("clickCount").textContent = clickCount;
        } else if (event.eventType === "exposure") {
          exposureCount++;
          document.getElementById("exposureCount").textContent = exposureCount;
        }
        document.getElementById("totalCount").textContent = clickCount + exposureCount;

        // 添加日志
        const log = document.getElementById("eventLog");
        const item = document.createElement("div");
        item.className = "event-item";
        item.innerHTML = `
        <span class="event-type">[${event.eventType.toUpperCase()}]</span>
        <span class="event-cls"> cls: ${event.cls}</span>
        ${event.clsExt ? `<span> ext: ${JSON.stringify(event.clsExt)}</span>` : ""}
        <div class="event-time">${new Date(event.time).toLocaleString()}</div>
      `;
        log.insertBefore(item, log.firstChild);
      };

      // 清空事件
      window.clearEvents = function () {
        tracker.clearEvents();
        clickCount = 0;
        exposureCount = 0;
        document.getElementById("clickCount").textContent = "0";
        document.getElementById("exposureCount").textContent = "0";
        document.getElementById("totalCount").textContent = "0";
        document.getElementById("eventLog").innerHTML = '<div style="color: #6a9955;">// 事件已清空</div>';
      };

      // 获取所有事件
      window.getEvents = function () {
        const events = tracker.getEvents();
        console.log("所有事件:", events);
        alert("事件总数: " + events.length + "\n查看控制台获取详细信息");
      };
    </script>
  </body>
</html>
