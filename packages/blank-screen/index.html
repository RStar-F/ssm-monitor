<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>白屏监测模块测试</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        color: #333;
        margin-bottom: 20px;
      }
      .section {
        background: white;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h2 {
        color: #666;
        margin-bottom: 15px;
        font-size: 18px;
      }
      .btn {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }
      .btn-primary {
        background: #1890ff;
        color: white;
      }
      .btn-primary:hover {
        background: #40a9ff;
      }
      .btn-danger {
        background: #ff4d4f;
        color: white;
      }
      .btn-danger:hover {
        background: #ff7875;
      }
      .btn-success {
        background: #52c41a;
        color: white;
      }
      .btn-success:hover {
        background: #73d13d;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 20px;
        padding: 20px;
        background: #f0f2f5;
        border-radius: 8px;
      }
      .status-indicator {
        width: 20px;
        height: 20px;
        border-radius: 50%;
      }
      .status-indicator.normal {
        background: #52c41a;
      }
      .status-indicator.warning {
        background: #faad14;
      }
      .status-indicator.danger {
        background: #ff4d4f;
      }
      .status-text {
        font-size: 18px;
        font-weight: bold;
      }
      .status-ratio {
        font-size: 14px;
        color: #666;
      }
      .event-log {
        max-height: 300px;
        overflow-y: auto;
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 15px;
        border-radius: 6px;
        font-family: "Monaco", "Menlo", monospace;
        font-size: 12px;
        line-height: 1.6;
      }
      .event-item {
        margin-bottom: 8px;
        padding: 8px;
        background: #2d2d2d;
        border-radius: 4px;
      }
      .event-item.warning {
        border-left: 3px solid #faad14;
      }
      .event-item.danger {
        border-left: 3px solid #ff4d4f;
      }
      .hint {
        color: #999;
        font-size: 12px;
        margin-top: 10px;
      }
      #app {
        min-height: 400px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🖥️ 白屏监测模块测试</h1>

      <div class="section">
        <h2>白屏状态</h2>
        <div class="status">
          <div class="status-indicator normal" id="statusIndicator"></div>
          <div>
            <div class="status-text" id="statusText">页面正常</div>
            <div class="status-ratio">空白比例: <span id="blankRatio">0%</span></div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>测试控制</h2>
        <p class="hint">点击下方按钮测试白屏检测功能</p>
        <div>
          <button class="btn btn-danger" onclick="simulateBlankScreen()">模拟白屏</button>
          <button class="btn btn-success" onclick="restoreContent()">恢复正常</button>
          <button class="btn btn-primary" onclick="manualDetect()">手动检测</button>
        </div>
      </div>

      <div class="section">
        <h2>页面内容</h2>
        <div id="app">
          <h3 style="margin-bottom: 15px; color: #333">这是页面主要内容区域</h3>
          <p style="color: #666; line-height: 1.8">白屏监测模块会通过以下方式检测页面白屏：</p>
          <ul style="color: #666; line-height: 1.8; margin: 10px 0 0 20px">
            <li>检查重要DOM元素是否存在且可见（如 #app, #root 等）</li>
            <li>使用采样点检测页面空白区域比例</li>
            <li>当空白比例超过阈值时触发白屏事件</li>
          </ul>
          <div
            style="margin-top: 20px; padding: 15px; background: #e6f7ff; border-radius: 6px; border: 1px solid #91d5ff"
          >
            <strong style="color: #1890ff">提示：</strong>
            <span style="color: #666">点击"模拟白屏"按钮，页面内容将被隐藏，模块会检测到白屏状态。</span>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>事件日志</h2>
        <div class="event-log" id="eventLog">
          <div style="color: #6a9955">// 等待白屏事件...</div>
        </div>
      </div>
    </div>

    <script type="module">
      import { BlankScreenMonitor } from "./src/index.ts";

      // 创建白屏监控实例
      window.monitor = new BlankScreenMonitor({
        enabled: true,
        threshold: 0.9,
        checkDelay: 1000,
        checkInterval: 3000,
        samplingPoints: 16,
        importantSelectors: ["#app"],
      });

      // 监听事件
      monitor.onEvent = function (event) {
        console.log("白屏事件:", event);
        addLog(event);
        updateStatus(event);
      };

      // 更新状态显示
      function updateStatus(event) {
        const indicator = document.getElementById("statusIndicator");
        const text = document.getElementById("statusText");
        const ratio = document.getElementById("blankRatio");

        ratio.textContent = (event.blankRatio * 100).toFixed(1) + "%";

        if (event.isBlank) {
          indicator.className = "status-indicator danger";
          text.textContent = "检测到白屏！";
          text.style.color = "#ff4d4f";
        } else if (event.blankRatio > 0.5) {
          indicator.className = "status-indicator warning";
          text.textContent = "页面部分空白";
          text.style.color = "#faad14";
        } else {
          indicator.className = "status-indicator normal";
          text.textContent = "页面正常";
          text.style.color = "#52c41a";
        }
      }

      // 添加日志
      function addLog(event) {
        const log = document.getElementById("eventLog");
        const item = document.createElement("div");
        item.className = "event-item " + (event.isBlank ? "danger" : "warning");
        item.innerHTML = `
        <div style="color: ${event.isBlank ? "#ff4d4f" : "#faad14"}; font-weight: bold;">
          ${event.isBlank ? "⚠️ 白屏检测!" : "📊 页面状态"}
        </div>
        <div>空白比例: ${(event.blankRatio * 100).toFixed(1)}%</div>
        <div style="color: #6a9955; font-size: 11px;">${new Date(event.time).toLocaleString()}</div>
      `;
        log.insertBefore(item, log.firstChild);
      }

      // 模拟白屏
      window.simulateBlankScreen = function () {
        const app = document.getElementById("app");
        app.style.display = "none";
        addLog({ isBlank: false, blankRatio: 0, time: Date.now() });
        document.getElementById("statusText").textContent = "内容已隐藏，等待检测...";
        document.getElementById("statusText").style.color = "#666";
      };

      // 恢复内容
      window.restoreContent = function () {
        const app = document.getElementById("app");
        app.style.display = "block";
        const result = monitor.detect();
        updateStatus({
          isBlank: result.isBlank,
          blankRatio: result.blankRatio,
          time: Date.now(),
          url: "",
          userAgent: "",
        });
      };

      // 手动检测
      window.manualDetect = function () {
        const result = monitor.detect();
        alert(`检测结果:\n白屏: ${result.isBlank ? "是" : "否"}\n空白比例: ${(result.blankRatio * 100).toFixed(1)}%`);
      };
    </script>
  </body>
</html>
